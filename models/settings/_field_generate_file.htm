<div style="margin-bottom: 16px;">
    <button
        type="button"
        class="btn btn-primary"
        id="beysong-genfile-btn">
        Generate &amp; Save API Key
    </button>
    <p style="margin-top: 8px; color: #666; font-size: 13px;">
        Generates a random API key (if not set) and saves it. The plugin automatically serves the verification file at <code>/[key].txt</code>.
    </p>
    <p id="beysong-key-display" style="margin-top: 8px; display: none;">
        Your API Key: <strong id="beysong-key-value" style="color: #015FAA;"></strong>
    </p>
    <p id="beysong-verify-url-display" style="margin-top: 4px; color: #666; font-size: 13px;">
        Verification URL: <code id="beysong-verify-url"></code>
    </p>
</div>

<script>
    $(document).ready(function() {
        function updateKeyDisplay(key) {
            if (key) {
                $('#beysong-key-display').show();
                $('#beysong-verify-url-display').show();
                $('#beysong-key-value').text(key);
                var baseUrl = window.location.protocol + '//' + window.location.host;
                $('#beysong-verify-url').text(baseUrl + '/' + key + '.txt');
                // Update form field too
                $('input[name="Settings[apikey]"]').val(key).trigger('change');
            }
        }

        // Load existing key on page load
        var existingKey = $('input[name="Settings[apikey]"]').val()
                       || $('input[name$="[apikey]"]').first().val()
                       || '';
        if (existingKey) updateKeyDisplay(existingKey);

        $('#beysong-genfile-btn').on('click', function() {
            var btn = $(this);
            btn.prop('disabled', true).text('Generating...');

            fetch('/beysong_indexnow/generate-key', {
                headers: { 'Accept': 'application/json' }
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.key) {
                    updateKeyDisplay(data.key);
                    $.oc.flashMsg({ message: 'API Key generated and saved!', type: 'success' });
                }
                btn.prop('disabled', false).text('Generate & Save API Key');
            })
            .catch(function() {
                btn.prop('disabled', false).text('Generate & Save API Key');
            });
        });
    });
</script>
